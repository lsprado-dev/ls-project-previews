<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oliveira & Sales - Project Case Study</title>
    <style>
        :root {
            --bg-color: #1a1a1d;
            --text-color: #f1f1f1;
            --accent-color: #ffc107;
            --button-text: #1a1a1d;
            --font-stack: 'Arial', sans-serif;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            opacity: 0;
            transform: scale(0.9);
            animation: fadeInScale 0.8s ease-out forwards;
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #d1d1d1;
        }

        .cta-button {
            display: inline-block;
            background-color: var(--accent-color);
            color: var(--button-text);
            padding: 0.75rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        }

        .divider {
            margin: 2rem 0;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oliveira & Sales</h1>
        <div class="divider"></div>
        <p>Project successfully completed and deployed. This environment was used for client previews and final testing. To view the live, fully operational website, please click the button below.</p>
        <a href="https://www.oliveirasales.com.br/" target="_blank" class="cta-button">Check Live Site</a>
    </div>
</body>
</html>
